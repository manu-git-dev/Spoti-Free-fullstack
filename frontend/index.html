<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Applique le theme AVANT le premier rendu, pour eviter le flash clair au chargement
      // (la page s'afficherait sinon avec le `:root` clair avant que React ne monte).
      // Sombre par defaut : seul un choix explicite memorise ("light") passe en clair.
      // Cette regle doit rester d'accord avec src/lib/theme.js.
      if (localStorage.getItem("theme") !== "light") {
        document.documentElement.classList.add("dark");
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Source+Code+Pro:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spoti-Free — écouter de la musique libre</title>
    <meta
      name="description"
      content="Lecteur de musique en ligne : catalogue Creative Commons (CC BY et CC BY-SA), playlists, favoris et dépôt de morceaux. Projet personnel full-stack React et Node.js."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
