<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Applique le theme avant le premier rendu (anti-flash). Fichier a part et non script
         inline : la CSP de production interdit les scripts inline. Voir public/theme-init.js. -->
    <script src="/theme-init.js"></script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Source+Code+Pro:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- `viewport-fit=cover` n'est PAS decoratif : sans lui, iOS renvoie 0 pour toutes les
         `env(safe-area-inset-*)`, et les protections ecrites dans le CSS (BottomNav, plein ecran
         du lecteur) ne font litteralement rien. Il fait aussi s'etendre la mise en page SOUS la
         barre d'etat et l'indicateur d'accueil : c'est pourquoi il doit toujours s'accompagner
         des paddings `env(safe-area-inset-*)` correspondants, sinon il empire le probleme. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Spoti-Free — écouter de la musique libre</title>
    <meta
      name="description"
      content="Lecteur de musique en ligne : catalogue Creative Commons (CC BY et CC BY-SA), playlists, favoris et dépôt de morceaux. Projet personnel full-stack React et Node.js."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
